name: VBWD CE - CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

env:
  NODE_VERSION: '18'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Install → Unit → Integration → E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # ========== Step 1: Install (recipe) ==========
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run installation script
        run: |
          chmod +x recipes/dev-install-ce.sh
          ./recipes/dev-install-ce.sh

      # ========== Step 2: Backend Unit Tests ==========
      - name: Run backend unit tests
        working-directory: vbwd-backend
        run: docker compose run --rm test pytest tests/unit/ -v --tb=short

      # ========== Step 3: Backend Integration Tests ==========
      - name: Run backend integration tests
        working-directory: vbwd-backend
        run: docker compose run --rm test pytest tests/integration/ -v --tb=short
        continue-on-error: true

      # ========== Step 4: Frontend Lint + Unit Tests ==========
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint vbwd-fe-core
        working-directory: vbwd-fe-core
        run: npm run lint
        continue-on-error: true

      - name: Lint vbwd-fe-user
        working-directory: vbwd-fe-user
        run: npm run lint
        continue-on-error: true

      - name: Lint vbwd-fe-admin
        working-directory: vbwd-fe-admin
        run: npm run lint
        continue-on-error: true

      - name: Test vbwd-fe-core
        working-directory: vbwd-fe-core
        run: npm run test 2>/dev/null || echo "Core tests not available"
        continue-on-error: true

      - name: Test vbwd-fe-user
        working-directory: vbwd-fe-user
        run: npm run test 2>/dev/null || echo "User app tests not available"
        continue-on-error: true

      - name: Test vbwd-fe-admin
        working-directory: vbwd-fe-admin
        run: npm run test 2>/dev/null || echo "Admin app tests not available"
        continue-on-error: true

      # ========== Step 5: E2E Tests (Playwright) ==========
      - name: Install Playwright browsers
        working-directory: vbwd-fe-user
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests (user app)
        working-directory: vbwd-fe-user
        env:
          VITE_BACKEND_URL: http://localhost:5000
        run: npx playwright test --reporter=list
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            vbwd-fe-user/playwright-report/
            vbwd-fe-user/test-results/
          retention-days: 7

      # ========== Cleanup ==========
      - name: Stop backend services
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v